# Source list: one section = one third-party repo; the section name is the
# clone dir (package/custom/<name>). This file says where code comes from, never
# whether it ends up in the firmware — that decision lives entirely in
# common.config (every build) and firmware/config/<name>.config (one build).
# repo = git url (required)
# ref  = branch|tag|SHA (optional, default: the repo's default branch)
# Nothing else: the release notes table discovers these repos' packages on its
# own, and what ships is decided by common.config / firmware/config/<build>.config.

# passwall2; its dependencies (xray-core/sing-box/chinadns-ng/geoview/...) come
# from the companion repo below
[passwall2]
repo = https://github.com/Openwrt-Passwall/openwrt-passwall2.git

# dependency repo only: supplies the cores and protocol plugins passwall2 selects
[passwall-packages]
repo = https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git

# nikki, plus its prebuilt mihomo core. Enabled by x86 and by the 256MB tr3000
# only (see those .config files): too large for the other builds' flash.
[nikki]
repo = https://github.com/nikkinikki-org/OpenWrt-nikki.git

# own themes and the aurora config UI (single-package repos at the repo root;
# the default theme shadcn is set via uci-defaults)
[luci-theme-shadcn]
repo = https://github.com/eamonxg/luci-theme-shadcn.git

[luci-theme-aurora]
repo = https://github.com/eamonxg/luci-theme-aurora.git

[luci-app-aurora-config]
repo = https://github.com/eamonxg/luci-app-aurora-config.git

# OpenClash, enabled on Arthur (jdcloud_re-ss-01) only — see jdcloud.config.
# Its meta core is not in the repo; the build fetches it into this package so it
# rides inside the openclash ipk, reaching only the device that installs it
# rather than the whole build's shared files/ (preset-openclash-core.sh).
[openclash]
repo = https://github.com/vernesong/OpenClash.git
