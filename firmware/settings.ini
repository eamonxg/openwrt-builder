# Firmware personalization (empty or removed key = feature disabled).
# Values must not contain single quotes, backslashes, slashes, '#' or '|':
# '#' starts an INI comment and '|' is rejected outright; the others would
# silently break the generated first-boot scripts.
[settings]
BUILD_BY        = eamonxg
WIFI_SSID       = Rilakkuma
# One SSID on both bands is the intent, not an oversight: clients then roam
# between 2.4 and 5 GHz on their own. Set WIFI_SSID_5G only to split the bands
# (e.g. Rilakkuma_5G) when a client keeps picking the slower one and you want
# to pin it by hand; it overrides WIFI_SSID on 5 GHz and needs WIFI_COUNTRY.
WIFI_SSID_5G    =
WIFI_KEY        = Rilakkuma
# 5 GHz default wireless needs a country code (mac80211 restriction); empty = 2.4 GHz only
WIFI_COUNTRY    = CN
# wireless encryption: psk2 (WPA2) / sae (WPA3) / sae-mixed (WPA2/WPA3 mixed, the default)
WIFI_ENCRYPTION = sae-mixed
