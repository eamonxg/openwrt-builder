# Firmware personalization. A section name is what it applies to: [settings] is
# the base for everything, any other section names a build or one device of a
# build (spell devices exactly as builds.ini's `devices =` does). The narrower
# scope wins, and an empty value there is a real override -- that is how one
# device switches off something [settings] turned on.
# Values must not contain single quotes, backslashes, slashes, '#' or '|':
# '#' starts an INI comment and '|' is rejected outright; the others would
# silently break the generated first-boot scripts.
[settings]
BUILD_BY        = eamonxg
WIFI_SSID       = Rilakkuma
# One SSID on both bands is the intent, not an oversight: clients then roam
# between 2.4 and 5 GHz on their own. Set WIFI_SSID_5G only to split the bands
# when you want to pin a client to 5 GHz by hand; it overrides WIFI_SSID on
# 5 GHz and needs WIFI_COUNTRY.
WIFI_SSID_5G    =
WIFI_KEY        = Rilakkuma
# 5 GHz default wireless needs a country code (mac80211 restriction); empty = 2.4 GHz only
WIFI_COUNTRY    = CN
# wireless encryption: psk2 (WPA2) / sae (WPA3) / sae-mixed (WPA2/WPA3 mixed, the default)
WIFI_ENCRYPTION = sae-mixed
# LAN_IP is unset here on purpose: an unset key generates no script at all, so
# builds that do not need their own address keep OpenWrt's 192.168.1.1.

# The three tr3000 devices are one box in three flash layouts -- you only ever
# flash one of them onto a given router, so they share an SSID rather than
# renaming the network depending on how it was flashed.
[tr3000]
WIFI_SSID       = Rilakkuma_Cudy

[jdcloud_re-cs-02]
WIFI_SSID       = Rilakkuma_Athena
LAN_IP          = 192.168.8.1

[jdcloud_re-ss-01]
WIFI_SSID       = Rilakkuma_Arthur
WIFI_SSID_5G    = Rilakkuma_Arthur_5G
LAN_IP          = 192.168.6.1
