# One section = one product line; the section name becomes the release tag
# prefix, the Actions job name and the firmware/config/<name>.config overlay.
# Optional keys: source = owner/repo (default openwrt/openwrt),
#                ref = branch|tag|SHA (default: the repo's default branch)
[x86]
target = x86/64

[jdcloud]
target  = qualcommax/ipq60xx
devices = jdcloud_re-cs-02 jdcloud_re-ss-01

# three profiles of the same box, differing only in flash layout:
#   cudy_tr3000-v1           64 MB   stock U-Boot partition table
#   cudy_tr3000-v1-ubootmod  122 MB  needs BL2/FIP flashed first (preloader.bin + bl31-uboot.fip)
#   cudy_tr3000-256mb-v1     230 MB  the 256 MB flash variant
[tr3000]
target  = mediatek/filogic
devices = cudy_tr3000-v1 cudy_tr3000-256mb-v1 cudy_tr3000-v1-ubootmod

[jdcloud_nss]
target  = qualcommax/ipq60xx
devices = jdcloud_re-cs-02 jdcloud_re-ss-01
source  = qosmio/openwrt-ipq
ref     = main-nss
